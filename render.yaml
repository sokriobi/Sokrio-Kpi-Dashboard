services:
  - type: web
    name: sokrio-kpi-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 8 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PYTHONIOENCODING
        value: utf-8
